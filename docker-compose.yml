# ==============================================================================
# docker-compose.yml — Local development environment
#
# WHAT IS DOCKER COMPOSE?
# Instead of starting each service manually in separate terminals, docker-compose
# starts ALL services with one command: `docker compose up`
#
# Each service runs in its own isolated container but they can talk to each
# other using their service name as a hostname (e.g. "backend:8000").
#
# HOW TO START:
#   docker compose up --build
#
# HOW TO STOP:
#   docker compose down
# ==============================================================================

version: "3.9"

services:

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"       # host:container → visit http://localhost:8000/docs
    volumes:
      - .:/app    # Live reload: your code changes are reflected instantly
      - /var/run/docker.sock:/var/run/docker.sock  # Backend needs to spawn runner containers
    env_file:
      - .env              # Loads all secrets from your .env file
    working_dir: /app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on: []        # Add 'db' here in Milestone 1 if running local Postgres

  # ── Frontend (React + Vite) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"       # Vite default dev port
    volumes:
      - ./frontend:/app
      - /app/node_modules # Don't overwrite the container's node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

# NOTE: Supabase runs as a hosted cloud service — it does NOT need a
# container here. We connect to it via environment variables.
